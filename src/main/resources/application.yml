spring:
  application:
    name: FreelancerBackend
  datasource:
    url: "${DATABASE_URL}"
    username: "${DATABASE_USERNAME}"
    password: "${DATABASE_PASSWORD}"
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        ddl-auto: update
  config:
    import: "optional:file:.env[.properties],application-dev.yml"
  profiles:
    active: "dev"

ai:
  llm:
    provider: openrouter
    api-key: ${OPENROUTER_API_KEY}
    model: ${OPENROUTER_MODEL:google/gemini-2.5-flash}
    api-url: ${OPENROUTER_API_URL:https://openrouter.ai/api/v1/chat/completions}

cloudinary:
  url: ${CLOUDINARY_URL}

logging:
  pattern:
    console: ${LOGPATTERN_CONSOLE:%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n}
  level:
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE