  workspace:
    id: 20938694
  base_url: "https://api.track.toggl.com/api/v9"
  organization_id: 20939604
  billable:
    enabled: false

# AI Project Assistant Configuration
ai:
  llm:
    provider: openrouter
    model: ${OPENROUTER_MODEL:google/gemini-2.5-flash}
    api-key: ${OPENROUTER_API_KEY}
    api-url: ${OPENROUTER_API_URL:https://openrouter.ai/api/v1/chat/completions}
    max-tokens: 1500
    temperature: 0.7
    timeout-seconds: 60

  # Pricing Engine Configuration
  pricing:
    # Cache duration in hours
    cache-ttl: 24
    # Minimum sample size for confidence
    min-sample-size: 5
    # Confidence thresholds
    confidence:
      low-threshold: 0.3   # < 5 samples
      medium-threshold: 0.7 # 5-20 samples
      high-threshold: 0.9   # 20+ samples

  # Rate limiting
  rate-limit:
    # Max requests per hour per user
    requests-per-hour: 10
    # Enable rate limiting
    enabled: true


